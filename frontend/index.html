<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MindQuest — AI Mental Wellbeing Companion</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app" class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">
        <div class="logo">🧠</div>
        <div>
          <h1>MindQuest</h1>
          <p class="small-muted" style="margin:0;font-size:11px">AI Mental Health Companion</p>
        </div>
      </div>

      <nav class="nav" aria-label="primary">
        <button class="nav-btn active" data-view="chat">Chat</button>
        <button class="nav-btn" data-view="journal">Journal</button>
        <button class="nav-btn" data-view="insights">Insights</button>
      </nav>

      <div class="sidebar-foot">
        <div>Made with ❤️ + Jac + AI</div>
        <div style="margin-top:6px;font-size:11px">Local dev UI</div>
      </div>
    </aside>

    <!-- Main -->
    <main class="main">
      <header class="topbar">
        <div>
          <h2 id="view-title">AI Companion</h2>
          <div class="small-muted">Chat safely about stress, feelings, and life stuff.</div>
        </div>

        <div class="actions">
          <input id="api-url-input" placeholder="Backend URL (for deploy)" />
          <button id="save-api-url" class="btn">Save</button>
        </div>
      </header>

      <section class="content">
        <!-- Chat view -->
        <div id="view-chat" class="panel view active">
          <h3>MindQuest Chat</h3>

          <div id="chat-messages" style="max-height:360px;overflow:auto;padding:8px;border-radius:10px;background:linear-gradient(180deg,rgba(255,255,255,0.02),transparent);margin-bottom:12px"></div>

          <div class="form-row" style="gap:8px">
            <input id="user-input" class="input" placeholder="Type your message…" />
            <button id="send-btn" class="btn">Send</button>
          </div>

          <div id="chat-status" class="small-muted" style="margin-top:8px">API: <span id="api-status">not set</span></div>
        </div>

        <!-- Journal view (minimal) -->
        <div id="view-journal" class="panel view">
          <h3>Journal</h3>
          <textarea id="journal-entry" placeholder="Write your thoughts..." style="min-height:140px"></textarea>
          <div style="margin-top:10px"><button id="save-journal" class="btn">Save</button></div>
          <div id="journal-result" class="small-muted" style="margin-top:8px"></div>
        </div>

        <!-- Insights view (minimal) -->
        <div id="view-insights" class="panel view">
          <h3>Insights</h3>
          <div style="margin-top:8px">
            <button id="get-insights" class="btn">Run Weekly Insights</button>
          </div>
          <pre id="insights-area" class="small-muted" style="margin-top:12px;white-space:pre-wrap;"></pre>
        </div>
      </section>
    </main>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
