<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MindQuest - AI Companion</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="app" class="app">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="brand">
      <div class="logo">🧠</div>
      <div>
        <h1>MindQuest</h1>
        <p class="small-muted" style="margin:0;font-size:11px">AI Mental Health Companion</p>
      </div>
    </div>

    <div class="nav">
      <button class="nav-btn active" data-view="chat">Chat</button>
      <button class="nav-btn" data-view="placeholder-moods" disabled>📊 Mood Logs</button>
      <button class="nav-btn" data-view="placeholder-profile" disabled>👤 Profile</button>
    </div>

    <div class="sidebar-foot">
      <div>Made with ❤️ + Jac + AI</div>
      <div style="margin-top:4px;font-size:11px">Local dev UI</div>
    </div>
  </div>

  <!-- Main -->
  <div class="main">

    <!-- Topbar -->
    <div class="topbar">
      <h2 id="view-title">AI Companion</h2>
    </div>

    <!-- Content -->
    <div class="content">

      <!-- Chat Panel -->
      <div id="chat-section" class="panel">
        <h3>MindQuest Chat</h3>
        <div id="chat-messages" class="chat-messages" style="max-height:400px;overflow-y:auto;margin-bottom:10px;"></div>

        <div class="form-row">
          <input type="text" id="chat-input" class="input" placeholder="Type your message…">
          <button id="chat-send-btn" class="btn">Send</button>
        </div>
      </div>

    </div>

  </div>

</div>

<script src="js/app.js"></script>
</body>
</html>
