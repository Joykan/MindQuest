<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MindQuest — Companion</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app" class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo">🧭</div>
        <h1>MindQuest</h1>
      </div>

      <nav class="nav">
        <button data-view="home" class="nav-btn active">Home</button>
        <button data-view="log-mood" class="nav-btn">Log Mood</button>
        <button data-view="journal" class="nav-btn">Journal</button>
        <button data-view="insights" class="nav-btn">Insights</button>
        <button data-view="history" class="nav-btn">History</button>
      </nav>

      <footer class="sidebar-foot">
        <small>Local Dev • <span id="api-status">checking…</span></small>
      </footer>
    </aside>

    <main class="main">
      <header class="topbar">
        <h2 id="view-title">Home</h2>
        <div class="actions">
          <input id="user-id" placeholder="user id (e.g. user_1)" />
          <button id="refresh-btn">Refresh</button>
        </div>
      </header>

      <section id="content" class="content">
        <!-- views are rendered here -->
      </section>
    </main>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
