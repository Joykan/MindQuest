services:
  - type: web
    name: mindquest-ai
    env: node
    region: oregon
    plan: free
    buildCommand: |
      echo "🚀 Building MindQuest AI..."
      cd server && npm install
      echo "✅ Dependencies installed"
    startCommand: cd server && node index.js
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
    autoDeploy: true
