<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>MindQuest Chat</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="panel" style="max-width:800px;margin:32px auto">
    <h2>MindQuest — Chat</h2>
    <div id="chat-window" style="height:300px;overflow:auto;border:1px solid #eee;padding:12px;border-radius:8px;background:#fff"></div>

    <div style="display:flex;gap:8px;margin-top:12px">
      <input id="chat-input" style="flex:1;padding:10px" placeholder="Type your message..." />
      <button id="send-btn" class="btn">Send</button>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="/js/chat-client.js"></script>
</body>
</html>
